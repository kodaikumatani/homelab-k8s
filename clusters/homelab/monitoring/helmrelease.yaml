apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring
  namespace: monitoring
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "82.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      interval: 1h
  values:
    grafana:
      adminPassword: admin
      service:
        type: NodePort
        nodePort: 30300
    prometheus:
      prometheusSpec:
        retention: 7d
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          fsGroup: 0
          runAsNonRoot: false
        initContainers:
          - name: fix-permissions
            image: busybox
            command: ["sh", "-c", "chown -R 0:0 /prometheus"]
            volumeMounts:
              - name: prometheus-monitoring-kube-prometheus-prometheus-db
                mountPath: /prometheus
                subPath: prometheus-db
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
    alertmanager:
      enabled: false
    nodeExporter:
      enabled: true
