apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openvpn
  namespace: openvpn
spec:
  interval: 5m
  chart:
    spec:
      chart: .
      sourceRef:
        kind: GitRepository
        name: openvpn-as
        namespace: openvpn
      interval: 1h
  values:
    replicaCount: 1
    image:
      repository: openvpn/openvpn-as
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: NodePort
      ports:
        admin: 943
        tcp: 443
        udp: 1194
    persistence:
      enabled: true
      size: 5Gi
      storageClass: local-path
      accessMode: ReadWriteOnce
    resources:
      limits:
        cpu: 500m
        memory: 1536Mi
      requests:
        cpu: 100m
        memory: 512Mi
    securityContext:
      privileged: true
      capabilities:
        add:
          - NET_ADMIN
          - MKNOD
