apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 5m
  chart:
    spec:
      chart: cert-manager
      sourceRef:
        kind: HelmRepository
        name: jetstack
      interval: 1h
  values:
    crds:
      enabled: true
    extraArgs:
      - --acme-http01-solver-nameservers=8.8.8.8:53,1.1.1.1:53
