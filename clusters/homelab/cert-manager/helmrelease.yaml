apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 5m
  chart:
    spec:
      chart: cert-manager
      sourceRef:
        kind: HelmRepository
        name: jetstack
      interval: 1h
  values:
    crds:
      enabled: true
    extraArgs:
      - "--acme-http01-solver-nameservers=8.8.8.8:53"
      - "--dns01-recursive-nameservers=8.8.8.8:53"
      - "--dns01-recursive-nameservers-only"
    podDnsPolicy: None
    podDnsConfig:
      nameservers:
        - "10.96.0.10"
      searches:
        - cert-manager.svc.cluster.local
        - svc.cluster.local
        - cluster.local
      options:
        - name: ndots
          value: "1"
